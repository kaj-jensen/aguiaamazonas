<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" role="img" aria-label="Águia Amazonas eagle emblem">
  <defs>
    <clipPath id="badge">
      <circle cx="36" cy="36" r="31"/>
    </clipPath>
    <linearGradient id="river" x1="8" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#65c8c7"/>
      <stop offset="1" stop-color="#238b78"/>
    </linearGradient>
  </defs>

  <circle cx="36" cy="36" r="34" fill="#f7f1e3"/>
  <g clip-path="url(#badge)">
    <rect x="5" y="5" width="62" height="62" fill="#0a3b2d"/>
    <circle cx="53" cy="18" r="10" fill="#f0be45"/>

    <!-- A single, rounded eagle silhouette: broad wing, head, beak and tail. -->
    <path
      d="M7 39c8-1 14-5 19-12 4-6 6-12 8-18 4 7 5 14 3 21 4-4 9-7 14-7 4 0 7 2 9 5l8 3-8 4c-2 5-7 8-13 9-7 1-13-2-18-7-4 6-10 11-19 14 5-5 8-10 10-14-4 2-8 3-13 2Z"
      fill="#f7f1e3"
    />
    <path d="M58 28.5 68 31l-9 4c1-2 1-4-1-6.5Z" fill="#f0be45"/>
    <circle cx="53.5" cy="28.2" r="1.35" fill="#0a3b2d"/>

    <!-- The Rio Negro beneath the eagle. -->
    <path d="M2 51c11-5 21-5 31 0s20 5 37-1v22H2Z" fill="url(#river)"/>
    <path d="M3 57c11-5 21-5 31 0s20 5 35-1" fill="none" stroke="#f7f1e3" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M6 64c9-3 18-3 27 1 10 4 20 4 33-1" fill="none" stroke="#cce8df" stroke-width="1.5" stroke-linecap="round" opacity=".8"/>
  </g>
  <circle cx="36" cy="36" r="31" fill="none" stroke="#f0be45" stroke-width="2"/>
  <circle cx="36" cy="36" r="34" fill="none" stroke="#0a3b2d" stroke-width="1.5"/>
</svg>
